<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>有鱼点评 - 消息</title>
  <link rel="stylesheet" href="./css/element.css">
  <link rel="stylesheet" href="./css/main.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { font-size: 12px; }
    body { background: linear-gradient(180deg, #f8f9fc 0%, #f5f5f5 100%); font-family: -apple-system, "PingFang SC", sans-serif; padding-bottom: 70px; }
    
    /* 顶部 */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 15px;
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(102, 126, 234, 0.2);
    }
    .back-btn {
      font-size: 20px;
      color: white;
      padding: 5px;
      margin-right: 10px;
      cursor: pointer;
    }
    .header-title {
      font-size: 17px;
      font-weight: 600;
      color: white;
    }
    
    /* Tab切换 */
    .tab-bar {
      display: flex;
      background: white;
      padding: 0 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      position: sticky;
      top: 52px;
      z-index: 99;
    }
    .tab-item {
      flex: 1;
      text-align: center;
      padding: 14px 0;
      font-size: 14px;
      color: #666;
      position: relative;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-item:active { background: #fafafa; }
    .tab-item.active {
      color: #667eea;
      font-weight: 600;
    }
    .tab-item.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 3px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 2px;
    }
    .tab-badge {
      display: inline-block;
      min-width: 16px;
      height: 16px;
      background: linear-gradient(135deg, #ff6b6b 0%, #ff4757 100%);
      color: white;
      font-size: 10px;
      border-radius: 8px;
      text-align: center;
      line-height: 16px;
      margin-left: 4px;
      padding: 0 4px;
      font-weight: 600;
    }
    
    /* 消息列表 */
    .msg-list {
      padding: 12px;
    }
    .msg-card {
      display: flex;
      padding: 15px;
      background: white;
      border-radius: 14px;
      margin-bottom: 10px;
      align-items: flex-start;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: all 0.2s;
      cursor: pointer;
    }
    .msg-card:active { transform: scale(0.98); }
    .msg-card.unread {
      background: linear-gradient(135deg, #fff 0%, #f8f9ff 100%);
      border-left: 3px solid #667eea;
    }
    .msg-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      margin-right: 12px;
      flex-shrink: 0;
      border: 2px solid #f0f0f0;
    }
    .msg-content {
      flex: 1;
      min-width: 0;
    }
    .msg-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }
    .msg-title {
      font-size: 14px;
      color: #333;
      font-weight: 600;
    }
    .msg-time {
      font-size: 11px;
      color: #bbb;
    }
    .msg-text {
      font-size: 13px;
      color: #888;
      line-height: 1.5;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .msg-preview {
      font-size: 12px;
      color: #999;
      margin-top: 8px;
      padding: 10px;
      background: #f8f9ff;
      border-radius: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      border: 1px solid rgba(102,126,234,0.1);
    }
    .msg-preview img {
      width: 40px;
      height: 40px;
      border-radius: 4px;
      margin-right: 8px;
      vertical-align: middle;
    }
    .unread-dot {
      width: 10px;
      height: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      margin-left: 8px;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(102,126,234,0.3);
    }
    
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #ccc;
    }
    .empty-state i {
      font-size: 64px;
      margin-bottom: 15px;
      color: #ddd;
    }
    .empty-state p {
      font-size: 14px;
      margin-bottom: 10px;
      color: #999;
    }
    .empty-state .hint {
      font-size: 12px;
      color: #bbb;
    }
  </style>
</head>
<body>
<div id="app">
  <!-- 顶部 -->
  <div class="header">
    <div class="back-btn" @click="goBack"><i class="el-icon-arrow-left"></i></div>
    <div class="header-title">消息</div>
  </div>
  
  <!-- Tab -->
  <div class="tab-bar">
    <div class="tab-item" :class="{active: activeTab === 1}" @click="switchTab(1)">
      互动
      <span class="tab-badge" v-if="unreadCount.interact > 0">{{unreadCount.interact > 99 ? '99+' : unreadCount.interact}}</span>
    </div>
    <div class="tab-item" :class="{active: activeTab === 2}" @click="switchTab(2)">
      系统
      <span class="tab-badge" v-if="unreadCount.system > 0">{{unreadCount.system > 99 ? '99+' : unreadCount.system}}</span>
    </div>
    <div class="tab-item" :class="{active: activeTab === 3}" @click="switchTab(3)">
      订单
      <span class="tab-badge" v-if="unreadCount.order > 0">{{unreadCount.order > 99 ? '99+' : unreadCount.order}}</span>
    </div>
  </div>
  
  <!-- 消息列表 -->
  <div class="msg-list">
    <!-- 互动消息 -->
    <template v-if="activeTab === 1">
      <div class="msg-card" v-for="msg in interactMsgs" :key="msg.id" :class="{unread: !msg.isRead}" @click="readMsg(msg)">
        <img class="msg-avatar" :src="msg.fromUserIcon || '/imgs/icons/default-icon.png'">
        <div class="msg-content">
          <div class="msg-header">
            <span class="msg-title">{{msg.fromUserName}}</span>
            <span class="msg-time">{{formatTime(msg.createTime)}}</span>
          </div>
          <div class="msg-text">
            <template v-if="msg.type === 1">赞了你的笔记</template>
            <template v-else-if="msg.type === 2">评论了你的笔记</template>
            <template v-else-if="msg.type === 3">关注了你</template>
          </div>
          <div class="msg-preview" v-if="msg.blogTitle">
            "{{msg.blogTitle}}"
          </div>
        </div>
        <div class="unread-dot" v-if="!msg.isRead"></div>
      </div>
      <div class="empty-state" v-if="interactMsgs.length === 0 && !loading">
        <i class="el-icon-chat-dot-round"></i>
        <p>暂无互动消息</p>
        <p class="hint">发布笔记让更多人看到你</p>
      </div>
    </template>
    
    <!-- 系统消息 -->
    <template v-if="activeTab === 2">
      <div class="msg-card" v-for="msg in systemMsgs" :key="msg.id" :class="{unread: !msg.isRead}">
        <img class="msg-avatar" src="/imgs/icons/default-icon.png">
        <div class="msg-content">
          <div class="msg-header">
            <span class="msg-title">系统通知</span>
            <span class="msg-time">{{formatTime(msg.createTime)}}</span>
          </div>
          <div class="msg-text">{{msg.content}}</div>
        </div>
      </div>
      <div class="empty-state" v-if="systemMsgs.length === 0 && !loading">
        <i class="el-icon-bell"></i>
        <p>暂无系统消息</p>
      </div>
    </template>
    
    <!-- 订单消息 -->
    <template v-if="activeTab === 3">
      <div class="msg-card" v-for="msg in orderMsgs" :key="msg.id" :class="{unread: !msg.isRead}">
        <img class="msg-avatar" src="/imgs/icons/default-icon.png">
        <div class="msg-content">
          <div class="msg-header">
            <span class="msg-title">订单通知</span>
            <span class="msg-time">{{formatTime(msg.createTime)}}</span>
          </div>
          <div class="msg-text">{{msg.content}}</div>
        </div>
      </div>
      <div class="empty-state" v-if="orderMsgs.length === 0 && !loading">
        <i class="el-icon-tickets"></i>
        <p>暂无订单消息</p>
        <p class="hint">抢购成功后会收到通知哦</p>
      </div>
    </template>
  </div>

  <foot-bar :active-btn="3" :unread="totalUnread"></foot-bar>
</div>

<script src="./js/vue.js"></script>
<script src="./js/axios.min.js"></script>
<script src="./js/element.js"></script>
<script src="./js/common.js"></script>
<script src="./js/footer.js"></script>
<script>
new Vue({
  el: '#app',
  data: {
    activeTab: 1,
    loading: false,
    interactMsgs: [],
    systemMsgs: [],
    orderMsgs: [],
    unreadCount: {
      interact: 0,
      system: 0,
      order: 0
    }
  },
  computed: {
    totalUnread() {
      return this.unreadCount.interact + this.unreadCount.system + this.unreadCount.order;
    }
  },
  mounted() {
    this.loadMessages();
    this.loadUnreadCount();
  },
  methods: {
    switchTab(tab) {
      this.activeTab = tab;
      this.loadMessages();
    },
    loadMessages() {
      this.loading = true;
      const type = this.activeTab;
      axios.post("/message/list", { type }).then(({data}) => {
        if (type === 1) this.interactMsgs = data || [];
        else if (type === 2) this.systemMsgs = data || [];
        else if (type === 3) this.orderMsgs = data || [];
      }).catch(err => {
        console.error(err);
      }).finally(() => {
        this.loading = false;
      });
    },
    loadUnreadCount() {
      axios.get('/message/unread')
        .then(({data}) => {
          if (data) {
            this.unreadCount = {
              interact: data.interact || 0,
              system: data.system || 0,
              order: data.order || 0
            };
          }
        }).catch(err => {
          console.error(err);
        });
    },
    readMsg(msg) {
      if (msg.isRead) {
        this.goToDetail(msg);
        return;
      }
      axios.put('/message/read/' + msg.id)
        .then(() => {
          msg.isRead = true;
          this.unreadCount.interact--;
          this.goToDetail(msg);
        }).catch(err => {
          console.error(err);
        });
    },
    goToDetail(msg) {
      if (msg.type === 3) {
        location.href = '/other-info.html?id=' + msg.fromUserId;
      } else if (msg.blogId) {
        location.href = '/blog-detail.html?id=' + msg.blogId;
      }
    },
    formatTime(time) {
      if (!time) return '';
      const d = new Date(time);
      const now = new Date();
      const diff = (now - d) / 1000;
      
      if (diff < 60) return '刚刚';
      if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
      if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
      if (diff < 604800) return Math.floor(diff / 86400) + '天前';
      
      return (d.getMonth() + 1) + '月' + d.getDate() + '日';
    },
    goBack() {
      history.back();
    }
  }
});
</script>
<script src="/js/float-chat.js"></script>
</body>
</html>
