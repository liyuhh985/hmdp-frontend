<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>有鱼点评</title>
  <link rel="stylesheet" href="./css/element.css">
  <link rel="stylesheet" href="./css/main.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 12px; }
    body { 
      background: linear-gradient(180deg, #f8f8f8 0%, #f2f2f2 100%); 
      padding-bottom: 60px; 
      min-height: 100vh;
    }
    
    /* 底部导航 */
    .foot {
      backdrop-filter: blur(12px) !important;
      -webkit-backdrop-filter: blur(12px) !important;
      border-top: 1px solid rgba(255, 255, 255, 0.3) !important;
      position: fixed !important;
      bottom: 0 !important;
      left: 0 !important;
      right: 0 !important;
      background: rgba(255, 255, 255, 0.75) !important;
      height: 60px !important;
      z-index: 9999 !important;
      display: flex !important;
      justify-content: space-around !important;
      align-items: center !important;
      box-shadow: 0 -2px 20px rgba(0, 0, 0, 0.06) !important;
    }
    .foot-box { display: flex !important; flex-direction: column !important; align-items: center !important; padding: 5px 10px !important; color: #999 !important; -webkit-tap-highlight-color: transparent !important; }
    .foot-box.active { color: #667eea !important; }
    .foot-view { font-size: 20px !important; height: 24px; line-height: 24px !important; }
    .foot-text { font-size: 10px !important; height: 14px; line-height: 14px !important; margin-top: 2px !important; }
    .foot .add-btn { width: 48px !important; height: 48px !important; border-radius: 24px !important; filter: brightness(0) saturate(100%) invert(51%) sepia(98%) saturate(1925%) hue-rotate(213deg) brightness(101%) contrast(97%); box-shadow: 0 4px 16px rgba(102, 126, 234, 0.35); }
    
    /* 搜索栏 */
    .search-bar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 12px 15px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .city-btn {
      color: white;
      font-size: 14px;
      display: flex;
      align-items: center;
    }
    .city-btn i { margin-left: 2px; font-size: 12px; }
    .search-input {
      flex: 1;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 8px 14px;
      display: flex;
      align-items: center;
    }
    .search-input input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 14px;
      color: white;
    }
    .search-input input::placeholder { color: rgba(255,255,255,0.7); }
    .search-input i { color: rgba(255,255,255,0.8); margin-right: 6px; }
    .header-icon {
      color: white;
      font-size: 20px;
      padding: 5px;
    }
    
    /* 分类区域 */
    .type-section {
      background: linear-gradient(180deg, #fff 0%, #fafafa 100%);
      margin: 10px;
      border-radius: 14px;
      padding: 15px 10px 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .type-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    .type-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 0;
      transition: transform 0.15s;
    }
    .type-item:active { transform: scale(0.92); }
    .type-icon {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: linear-gradient(145deg, #fff6f0 0%, #ffe8db 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 5px;
      box-shadow: 0 2px 6px rgba(255,102,51,0.08);
    }
    .type-icon img { width: 26px; height: 26px; }
    .type-name { font-size: 11px; color: #666; }
    
    /* 探店笔记 */
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 15px 8px;
    }
    .section-title h3 { font-size: 15px; font-weight: 600; color: #333; }
    .section-title h3::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 14px;
      background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
      border-radius: 2px;
      margin-right: 8px;
      vertical-align: middle;
    }
    .section-title span { font-size: 12px; color: #999; }
    
    .blog-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 0 10px 70px;
    }
    .blog-card {
      background: linear-gradient(180deg, #fff 0%, #fafafa 100%);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .blog-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
    }
    .blog-info { padding: 8px 10px; }
    .blog-title {
      font-size: 13px;
      color: #333;
      font-weight: 500;
      line-height: 1.4;
      height: 36px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .blog-meta {
      display: flex;
      align-items: center;
      margin-top: 8px;
    }
    .blog-avatar {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .blog-author {
      flex: 1;
      font-size: 11px;
      color: #999;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .blog-like {
      display: flex;
      align-items: center;
      font-size: 11px;
      color: #999;
    }
    .blog-like.liked { color: #667eea; }
    .blog-like.liked svg { animation: likeJump 0.3s ease; }
    @keyframes likeJump {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 50px 0;
      color: #ccc;
    }
    .empty-state i { font-size: 48px; }
    .empty-state p { font-size: 13px; margin-top: 10px; }
    
    /* 加载 */
    .loading-row {
      text-align: center;
      padding: 15px;
      color: #999;
      font-size: 12px;
    }
  </style>
</head>
<body>
<div id="app">
  <!-- 搜索栏 -->
  <div class="search-bar">
    <div class="city-btn" @click="toMap">附近 <i class="el-icon-location"></i></div>
    <div class="search-input">
      <i class="el-icon-search"></i>
      <input type="text" placeholder="搜索商户、地点" v-model="searchKey" @keyup.enter="doSearch">
    </div>
    <div class="header-icon" @click="toUserInfo"><i class="el-icon-user"></i></div>
  </div>
  
  <!-- 分类 -->
  <div class="type-section">
    <div class="type-grid">
      <div class="type-item" v-for="t in types" :key="t.id" @click="toShopList(t.id, t.name)">
        <div class="type-icon"><img :src="'/imgs/' + t.icon"></div>
        <div class="type-name">{{t.name}}</div>
      </div>
    </div>
  </div>
  
  <!-- 笔记 -->
  <div class="section-title">
    <h3>发现好店</h3>
    <span>精选推荐</span>
  </div>
  
  <div class="blog-list">
    <div class="blog-card" v-for="b in blogs" :key="b.id" @click="toBlogDetail(b)">
      <img class="blog-img" :src="b.img">
      <div class="blog-info">
        <div class="blog-title">{{b.title}}</div>
        <div class="blog-meta">
          <img class="blog-avatar" :src="b.icon || '/imgs/icons/default-icon.png'">
          <span class="blog-author">{{b.name}}</span>
          <span class="blog-like" :class="{liked: b.isLike}" @click.stop="addLike(b)">
            <svg width="14" height="14" viewBox="0 0 24 24" style="margin-right:4px;vertical-align:-2px;transition: all 0.2s;">
              <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" :fill="b.isLike ? '#667eea' : '#ccc'"/>
            </svg>
            {{b.liked || 0}}
          </span>
        </div>
      </div>
    </div>
    
    <div class="empty-state" v-if="!blogLoading && blogs.length === 0">
      <i class="el-icon-document"></i>
      <p>暂无笔记</p>
    </div>
    
    <div class="loading-row" v-if="blogLoadingMore">
      <i class="el-icon-loading"></i> 加载更多...
    </div>
  </div>

  <foot-bar :active-btn="1" :unread="unreadCount"></foot-bar>
</div>

<script src="./js/vue.js"></script>
<script src="./js/axios.min.js"></script>
<script src="./js/element.js"></script>
<script src="./js/common.js"></script>
<script src="./js/footer.js"></script>
<script>
new Vue({
  el: '#app',
  data: {
    types: [],
    blogs: [],
    current: 1,
    searchKey: '',
    blogLoading: false,
    blogLoadingMore: false,
    isReachBottom: false,
    unreadCount: 0
  },
  mounted() {
    this.loadTypes();
    this.loadBlogs();
    this.loadUnreadCount();
    window.addEventListener('scroll', this.onScroll);
  },
  methods: {
    loadTypes() {
      axios.get('/shop-type/list').then(({data}) => { this.types = data; });
    },
    loadBlogs() {
      this.current === 1 ? this.blogLoading = true : this.blogLoadingMore = true;
      axios.get('/blog/hot?current=' + this.current)
        .then(({data}) => {
          data.forEach(b => b.img = b.images.split(',')[0]);
          this.blogs = this.blogs.concat(data);
        })
        .finally(() => { this.blogLoading = false; this.blogLoadingMore = false; });
    },
    loadUnreadCount() {
      axios.get('/message/unread')
        .then(({data}) => {
          if (data) {
            this.unreadCount = (data.interact || 0) + (data.system || 0) + (data.order || 0);
          }
        }).catch(() => {});
    },
    onScroll() {
      const scrollTop = window.scrollY;
      const scrollHeight = document.documentElement.scrollHeight;
      const clientHeight = window.innerHeight;
      if (scrollTop + clientHeight >= scrollHeight - 100 && !this.isReachBottom && !this.blogLoadingMore) {
        this.isReachBottom = true;
        this.current++;
        this.loadBlogs();
      } else {
        this.isReachBottom = false;
      }
    },
    doSearch() {
      if (!this.searchKey.trim()) return;
      location.href = '/shop-list.html?search=' + encodeURIComponent(this.searchKey.trim());
    },
    addLike(b) {
      axios.put('/blog/like/' + b.id).then(() => {
        axios.get('/blog/' + b.id).then(({data}) => {
          b.liked = data.liked;
          b.isLike = data.isLike;
        });
      });
    },
    toShopList(id, name) { location.href = '/shop-list.html?type=' + id + '&name=' + name; },
    toBlogDetail(b) { location.href = '/blog-detail.html?id=' + b.id; },
    toUserInfo() { location.href = '/info.html'; },
    toMap() { location.href = '/map.html'; }
  }
});
</script>
<!-- AI 助手浮动组件 -->
<script src="./js/float-chat.js"></script>
</body>
</html>
