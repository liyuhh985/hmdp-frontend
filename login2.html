<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>有鱼点评 - 密码登录</title>
  <link rel="stylesheet" href="./css/element.css">
  <link href="./css/main.css" rel="stylesheet">
  <link href="./css/login.css" rel="stylesheet">
</head>
<body>
<div id="app">
  <div class="login-wrapper">
    <!-- 顶部导航 -->
    <div class="login-header">
      <div class="back-btn" onclick="history.back()">
        <i class="el-icon-arrow-left"></i>
      </div>
      <div class="header-title">密码登录</div>
      <div class="header-right"></div>
    </div>
    
    <!-- 品牌区域 -->
    <div class="brand-section">
      <div class="brand-icon">🐟</div>
      <h1 class="brand-title">有鱼点评</h1>
      <p class="brand-desc">发现身边的好店</p>
    </div>
    
    <!-- 登录卡片 -->
    <div class="login-card">
      <div class="card-header">
        <h2>账号密码登录</h2>
      </div>
      
      <div class="login-form">
        <div class="input-group">
          <el-input placeholder="请输入手机号" v-model="form.phone" prefix-icon="el-icon-mobile-phone"></el-input>
        </div>
        
        <div class="input-group">
          <el-input placeholder="请输入密码" v-model="form.password" prefix-icon="el-icon-lock" show-password></el-input>
        </div>
        
        <div class="forget-link">
          <a href="javascript:void(0)">忘记密码？</a>
        </div>
        
        <el-button class="login-btn" @click="login">登录</el-button>
        
        <div class="other-login">
          <a href="/login.html">验证码登录</a>
        </div>
      </div>
    </div>
    
    <!-- 用户协议 -->
    <div class="agreement">
      <input type="radio" name="readed" v-model="radio" value="1" id="agree">
      <label for="agree">我已阅读并同意<a href="javascript:void(0)">《用户服务协议》</a>和<a href="javascript:void(0)">《隐私政策》</a></label>
    </div>
  </div>
</div>

<script src="./js/vue.js"></script>
<script src="./js/axios.min.js"></script>
<script src="./js/element.js"></script>
<script src="./js/common.js"></script>

<script>
  const app = new Vue({
    el: "#app",
    data: {
      radio: "",
      form: {}
    },
    methods: {
      login() {
        if(!this.radio) {
          this.$message.error("请先同意用户协议");
          return;
        }
        if(!this.form.phone || !this.form.password) {
          this.$message.error("手机号和密码不能为空");
          return;
        }
        axios.post("/user/login", this.form)
          .then(({data}) => {
            if(data) {
              sessionStorage.setItem("token", data);
            }
            location.href = "/index.html";
          })
          .catch(err => this.$message.error(err));
      }
    }
  });
</script>
</body>
</html>
