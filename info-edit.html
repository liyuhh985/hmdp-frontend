<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>黑马点评 - 编辑资料</title>
  <link rel="stylesheet" href="./css/element.css">
  <link href="./css/main.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { font-size: 12px; }
    body { background: #f5f5f5; font-family: -apple-system, "PingFang SC", sans-serif; padding-bottom: 20px; }
    
    /* 顶部导航 */
    .header {
      background: white;
      padding: 15px;
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #f0f0f0;
    }
    .back-btn {
      font-size: 20px;
      color: #333;
      padding: 5px;
      margin-right: 10px;
    }
    .header-title {
      flex: 1;
      font-size: 17px;
      font-weight: 600;
      color: #333;
    }
    .save-btn {
      padding: 8px 16px;
      background: #ff6633;
      color: white;
      border-radius: 20px;
      font-size: 13px;
    }
    .save-btn.saving {
      background: #ccc;
    }
    
    /* 头像区域 */
    .avatar-section {
      background: white;
      padding: 30px;
      text-align: center;
      margin-bottom: 10px;
    }
    .avatar-img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #ff6633;
    }
    .avatar-tip {
      margin-top: 10px;
      font-size: 12px;
      color: #999;
    }
    
    /* 表单区域 */
    .form-section {
      background: white;
      margin-bottom: 10px;
    }
    .form-item {
      display: flex;
      align-items: center;
      padding: 15px;
      border-bottom: 1px solid #f0f0f0;
      min-height: 54px;
    }
    .form-item:last-child {
      border-bottom: none;
    }
    .form-label {
      width: 80px;
      font-size: 14px;
      color: #333;
      flex-shrink: 0;
    }
    .form-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14px;
      color: #333;
      text-align: right;
      background: transparent;
      min-height: 24px;
    }
    .form-input::placeholder {
      color: #ccc;
    }
    .form-textarea {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14px;
      color: #333;
      resize: none;
      min-height: 40px;
      text-align: right;
      background: transparent;
      line-height: 1.5;
    }
    .form-textarea::placeholder {
      color: #ccc;
    }
    .form-value {
      flex: 1;
      text-align: right;
      font-size: 14px;
      color: #666;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 5px;
    }
    .arrow-icon {
      color: #ccc;
      font-size: 12px;
    }
    
    /* 性别选择弹窗 */
    .popup-mask {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      display: flex;
      align-items: flex-end;
    }
    .popup-box {
      background: white;
      border-radius: 12px 12px 0 0;
      width: 100%;
    }
    .popup-title {
      padding: 15px;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      border-bottom: 1px solid #f0f0f0;
    }
    .popup-option {
      padding: 15px;
      text-align: center;
      font-size: 15px;
      color: #333;
      border-bottom: 1px solid #f0f0f0;
    }
    .popup-option:last-child {
      border-bottom: none;
    }
    .popup-option.selected {
      color: #ff6633;
    }
    .popup-cancel {
      padding: 15px;
      text-align: center;
      font-size: 15px;
      color: #999;
      background: #f9f9f9;
    }
    
    /* Toast */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 2000;
    }
  </style>
</head>
<body>
<div id="app">
  <!-- 顶部 -->
  <div class="header">
    <div class="back-btn" @click="goBack"><i class="el-icon-arrow-left"></i></div>
    <div class="header-title">编辑资料</div>
    <div class="save-btn" :class="{saving: saving}" @click="saveInfo">{{saving ? '保存中' : '保存'}}</div>
  </div>
  
  <!-- 头像 -->
  <div class="avatar-section">
    <img class="avatar-img" :src="form.icon || '/imgs/icons/default-icon.png'" alt="">
    <div class="avatar-tip">点击更换头像（暂不支持）</div>
  </div>
  
  <!-- 基本信息表单 -->
  <div class="form-section">
    <div class="form-item">
      <div class="form-label">昵称</div>
      <input class="form-input" type="text" v-model.trim="form.nickName" placeholder="请输入昵称" maxlength="20">
    </div>
    <div class="form-item">
      <div class="form-label">个人介绍</div>
      <textarea class="form-textarea" v-model.trim="form.introduce" placeholder="介绍一下自己吧" maxlength="100" rows="2"></textarea>
    </div>
  </div>
  
  <!-- 详细信息表单 -->
  <div class="form-section">
    <div class="form-item" @click="showGenderPicker = true">
      <div class="form-label">性别</div>
      <div class="form-value">
        <span>{{form.gender || '未设置'}}</span>
        <i class="el-icon-arrow-right arrow-icon"></i>
      </div>
    </div>
    <div class="form-item">
      <div class="form-label">城市</div>
      <input class="form-input" type="text" v-model.trim="form.city" placeholder="请输入城市">
    </div>
    <div class="form-item">
      <div class="form-label">生日</div>
      <input class="form-input" type="date" v-model="form.birthday">
    </div>
  </div>
  
  <!-- 性别选择弹窗 -->
  <div class="popup-mask" v-if="showGenderPicker" @click.self="showGenderPicker = false">
    <div class="popup-box">
      <div class="popup-title">选择性别</div>
      <div class="popup-option" :class="{selected: form.gender === '男'}" @click="selectGender('男')">男</div>
      <div class="popup-option" :class="{selected: form.gender === '女'}" @click="selectGender('女')">女</div>
      <div class="popup-option" :class="{selected: form.gender === '保密'}" @click="selectGender('保密')">保密</div>
      <div class="popup-cancel" @click="showGenderPicker = false">取消</div>
    </div>
  </div>
  
  <!-- Toast -->
  <div class="toast" v-if="toastShow">{{toastMsg}}</div>
</div>

<script src="./js/vue.js"></script>
<script src="./js/axios.min.js"></script>
<script src="./js/element.js"></script>
<script src="./js/common.js"></script>
<script>
new Vue({
  el: '#app',
  data: {
    user: {},
    form: {
      nickName: '',
      icon: '',
      introduce: '',
      gender: '',
      city: '',
      birthday: ''
    },
    showGenderPicker: false,
    saving: false,
    toastShow: false,
    toastMsg: ''
  },
  created() {
    this.loadUser();
  },
  methods: {
    loadUser() {
      axios.get('/user/me')
        .then(({data}) => {
          this.user = data;
          this.form.nickName = data.nickName || '';
          this.form.icon = data.icon || '';
          this.loadInfo();
        })
        .catch(() => { location.href = 'login.html'; });
    },
    loadInfo() {
      axios.get('/user/info/' + this.user.id)
        .then(({data}) => {
          if (data) {
            this.form.introduce = data.introduce || '';
            this.form.gender = data.gender || '';
            this.form.city = data.city || '';
            this.form.birthday = data.birthday || '';
          }
        });
    },
    selectGender(gender) {
      this.form.gender = gender;
      this.showGenderPicker = false;
    },
    showToast(msg) {
      this.toastMsg = msg;
      this.toastShow = true;
      setTimeout(() => {
        this.toastShow = false;
      }, 2000);
    },
    saveInfo() {
      if (this.saving) return;
      
      if (!this.form.nickName) {
        this.showToast('请输入昵称');
        return;
      }
      
      this.saving = true;
      
      axios.put('/user/info', {
        nickName: this.form.nickName,
        introduce: this.form.introduce,
        gender: this.form.gender,
        city: this.form.city,
        birthday: this.form.birthday
      }).then(() => {
        this.showToast('保存成功');
        setTimeout(() => {
          history.back();
        }, 1000);
      }).catch(err => {
        console.error(err);
        this.showToast('保存失败，请重试');
      }).finally(() => {
        this.saving = false;
      });
    },
    goBack() {
      history.back();
    }
  }
});
</script>
</body>
</html>
