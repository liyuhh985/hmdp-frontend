<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>黑马点评 - 个人主页</title>
  <link rel="stylesheet" href="./css/element.css">
  <link href="./css/main.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { font-size: 12px; }
    body { background: #f5f5f5; font-family: -apple-system, "PingFang SC", sans-serif; padding-bottom: 60px; }
    
    /* 顶部 */
    .header {
      
      z-index: 100;
      z-index: 100;
      background: linear-gradient(135deg, #ff6633 0%, #ff9966 100%);
      padding: 20px 15px 60px;
      position: relative;
      z-index: 100;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .back-btn {
      font-size: 20px;
      color: white;
      padding: 5px;
    }
    .setting-wrapper {
      position: relative;
      z-index: 100;
    }
    .setting-btn {
      font-size: 20px;
      color: white;
      padding: 5px;
      
    }
    
    /* 用户卡片 */
    .user-card {
      background: white;
      margin: -50px 15px 15px;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      position: relative;
      z-index: 100;
      z-index: 10;
    }
    .user-info {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }
    .user-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin-right: 15px;
      border: 3px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .user-detail {
      flex: 1;
    }
    .user-name {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 5px;
    }
    .user-intro {
      font-size: 13px;
      color: #999;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 200px;
    }
    .edit-btn {
      padding: 8px 16px;
      background: linear-gradient(135deg, #ff6633 0%, #ff9966 100%);
      color: white;
      border-radius: 20px;
      font-size: 13px;
      
    }
    
    /* 统计 */
    .stats-row {
      display: flex;
      justify-content: space-around;
      text-align: center;
      padding: 15px 0;
      border-top: 1px solid #f0f0f0;
    }
    .stat-item { cursor: pointer; }
    .stat-num {
      font-size: 20px;
      font-weight: 600;
      color: #333;
    }
    .stat-label {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
    
    /* Tab区域 */
    .tab-area {
      background: white;
      margin: 0 15px;
      border-radius: 12px;
      overflow: hidden;
    }
    .tab-header {
      display: flex;
      border-bottom: 1px solid #f0f0f0;
    }
    .tab-item {
      flex: 1;
      text-align: center;
      padding: 14px 0;
      font-size: 14px;
      color: #666;
      position: relative;
      z-index: 100;
      
    }
    .tab-item.on {
      color: #ff6633;
      font-weight: 500;
    }
    .tab-item.on::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 3px;
      background: #ff6633;
      border-radius: 2px;
    }
    .tab-content {
      padding: 15px;
      min-height: 200px;
    }
    
    /* 笔记卡片 */
    .note-card {
      display: flex;
      background: #f9f9f9;
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
      
    }
    .note-img {
      width: 80px;
      height: 80px;
      object-fit: cover;
    }
    .note-info {
      flex: 1;
      padding: 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .note-title {
      font-size: 14px;
      color: #333;
      font-weight: 500;
      margin-bottom: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .note-meta {
      font-size: 12px;
      color: #999;
      display: flex;
      gap: 15px;
    }
    
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 40px 0;
      color: #999;
    }
    .empty-state i {
      font-size: 48px;
      margin-bottom: 10px;
      display: block;
    }
    
    /* 退出弹窗 */
    .popup-mask {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .popup-box {
      background: white;
      border-radius: 12px;
      padding: 20px;
      width: 280px;
      text-align: center;
    }
    .popup-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
    }
    .popup-msg {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }
    .popup-btns {
      display: flex;
      gap: 10px;
    }
    .popup-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      
    }
    .popup-btn.cancel {
      background: #f5f5f5;
      color: #666;
    }
    .popup-btn.confirm {
      background: #ff4444;
      color: white;
    }
    
    /* 设置菜单 */
    .setting-menu {
      position: absolute;
      top: 50px;
      right: 10px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      z-index: 200;
      overflow: hidden;
    }
    .setting-menu.show { display: block; }
    .setting-item {
      padding: 12px 20px;
      font-size: 14px;
      color: #333;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
    }
    .setting-item:last-child { border-bottom: none; }
    .setting-item:hover { background: #f9f9f9; }
    .setting-item.logout { color: #ff4444; }
  </style>
</head>
<body>
<div id="app">
  <!-- 顶部 -->
  <div class="header">
    <div class="header-top">
      <div class="back-btn" @click="goBack"><i class="el-icon-arrow-left"></i></div>
      <div class="setting-wrapper">
        <div class="setting-btn" @click="showSetting = !showSetting"><i class="el-icon-more"></i></div>
        <div class="setting-menu" v-show="showSetting" @click.stop>
          <div class="setting-item" @click="toEdit">编辑资料</div>
          <div class="setting-item logout" @click="showLogout = true; showSetting = false">退出登录</div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- 用户卡片 -->
  <div class="user-card">
    <div class="user-info">
      <img class="user-avatar" :src="user.icon || '/imgs/icons/default-icon.png'" alt="">
      <div class="user-detail">
        <div class="user-name">{{user.nickName || '用户'}}</div>
        <div class="user-intro">{{info.introduce || '这个人很懒，什么都没写'}}</div>
      </div>
    </div>
    
    <!-- 统计数据 -->
    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-num">{{blogs.length}}</div>
        <div class="stat-label">笔记</div>
      </div>
      <div class="stat-item" @click="toFollowList('follow')">
        <div class="stat-num">{{followCount}}</div>
        <div class="stat-label">关注</div>
      </div>
      <div class="stat-item" @click="toFollowList('fans')">
        <div class="stat-num">{{fansCount}}</div>
        <div class="stat-label">粉丝</div>
      </div>
    </div>
  </div>
  
  <!-- Tab区域 -->
  <div class="tab-area">
    <div class="tab-header">
      <div class="tab-item" :class="{on: activeTab === 1}" @click="activeTab = 1">笔记</div>
      <div class="tab-item" :class="{on: activeTab === 2}" @click="activeTab = 2">动态</div>
    </div>
    <div class="tab-content">
      <div v-if="activeTab === 1">
        <div class="note-card" v-for="b in blogs" :key="b.id" @click="toBlog(b.id)">
          <img class="note-img" :src="b.images.split(',')[0]">
          <div class="note-info">
            <div class="note-title">{{b.title}}</div>
            <div class="note-meta">
              <span><i class="el-icon-thumb"></i> {{b.liked || 0}}</span>
              <span><i class="el-icon-chat-dot-round"></i> {{b.comments || 0}}</span>
            </div>
          </div>
        </div>
        <div class="empty-state" v-if="blogs.length === 0">
          <i class="el-icon-document"></i>
          <p>还没有发布笔记</p>
        </div>
      </div>
      <div v-if="activeTab === 2">
        <div class="note-card" v-for="b in blogs2" :key="b.id" @click="toBlog(b.id)">
          <img class="note-img" :src="b.img">
          <div class="note-info">
            <div class="note-title">{{b.title}}</div>
            <div class="note-meta">
              <span><i class="el-icon-user"></i> {{b.name}}</span>
            </div>
          </div>
        </div>
        <div class="empty-state" v-if="blogs2.length === 0">
          <i class="el-icon-user"></i>
          <p>关注的人还没发动态</p>
        </div>
      </div>
    </div>
  </div>
  
  <!-- 退出弹窗 -->
  <div class="popup-mask" v-if="showLogout" @click.self="showLogout = false">
    <div class="popup-box">
      <div class="popup-title">退出登录</div>
      <div class="popup-msg">确定要退出当前账号吗？</div>
      <div class="popup-btns">
        <div class="popup-btn cancel" @click="showLogout = false">取消</div>
        <div class="popup-btn confirm" @click="doLogout">确定</div>
      </div>
    </div>
  </div>

  <foot-bar :active-btn="4" :unread="unreadCount"></foot-bar>
</div>

<script src="./js/vue.js"></script>
<script src="./js/axios.min.js"></script>
<script src="./js/element.js"></script>
<script src="./js/common.js"></script>
<script src="./js/footer.js"></script>
<script>
new Vue({
  el: '#app',
  data: {
    user: {},
    info: {},
    blogs: [],
    blogs2: [],
    activeTab: 1,
    showLogout: false,
    showSetting: false,
    followCount: 0,
    fansCount: 0,
    params: { minTime: 0, offset: 0 },
    unreadCount: 0
  },
  created() {
    this.loadUser();
    this.loadUnreadCount();
  },
  methods: {
    loadUser() {
      axios.get('/user/me')
        .then(({data}) => {
          this.user = data;
          this.loadInfo();
          this.loadBlogs();
          this.loadFollowCount();
        })
        .catch(() => { location.href = 'login.html'; });
    },
    loadInfo() {
      axios.get('/user/info/' + this.user.id)
        .then(({data}) => { if (data) this.info = data; });
    },
    loadBlogs() {
      axios.get('/blog/of/me')
        .then(({data}) => { this.blogs = data || []; });
    },
    loadFollowCount() {
      // 获取关注数和粉丝数
      axios.get('/follow/count/' + this.user.id)
        .then(({data}) => {
          if (data) {
            this.followCount = data.followCount || 0;
            this.fansCount = data.fansCount || 0;
          }
        }).catch(() => {
          // 接口不存在时显示0
          this.followCount = 0;
          this.fansCount = 0;
        });
    },
    loadUnreadCount() {
      axios.get('/message/unread')
        .then(({data}) => {
          if (data) {
            this.unreadCount = (data.interact || 0) + (data.system || 0) + (data.order || 0);
          }
        }).catch(() => {});
    },
    loadFollowBlogs() {
      axios.get('/blog/of/follow', {
        params: { offset: this.params.offset, lastId: this.params.minTime || Date.now() + 1 }
      }).then(({data}) => {
        if (data && data.list) {
          data.list.forEach(b => b.img = b.images.split(',')[0]);
          this.blogs2 = data.list;
        }
      });
    },
    goBack() { history.back(); },
    toEdit() { 
      this.showSetting = false;
      location.href = 'info-edit.html'; 
    },
    doLogout() {
      axios.post('/user/logout').then(() => {
        sessionStorage.removeItem('token');
        location.href = '/';
      });
    },
    toBlog(id) { location.href = '/blog-detail.html?id=' + id; },
    toFollowList(type) {
      // TODO: 跳转到关注/粉丝列表页
      console.log('跳转到' + (type === 'follow' ? '关注' : '粉丝') + '列表');
    }
  },
  watch: {
    activeTab(val) {
      if (val === 2 && this.blogs2.length === 0) {
        this.loadFollowBlogs();
      }
    }
  },
  mounted() {
    // 点击其他地方关闭设置菜单
    document.addEventListener('click', () => {
      this.showSetting = false;
    });
  }
});
</script>
</body>
</html>
